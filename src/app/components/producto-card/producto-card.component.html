
<div id="card">
  <img [src]="producto.img" class="card-img-top" alt="imagen del producto">

  <div id="card-body">
    <h5 class="card-title">
      {{producto.name}}
    </h5>

    <p class="card-text">
      {{producto.breveDescripcion}}
    </p>

    <p>
      {{ producto.price | currency }}
    </p>

    <button class="btn">
      <a [routerLink]="['/producto', producto.id]" class="btn btn-primary">Más información</a>
    </button>
  </div>
</div>
